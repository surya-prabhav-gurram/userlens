version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB:       userlens
      POSTGRES_USER:     userlens
      POSTGRES_PASSWORD: userlens
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U userlens"]
      interval: 5s
      timeout: 5s
      retries: 10

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.8.1
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri /mlflow/mlruns
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow/mlruns

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL:       postgresql://userlens:userlens@postgres:5432/userlens
      ANTHROPIC_API_KEY:  ${ANTHROPIC_API_KEY:-}
      MLFLOW_TRACKING_URI: http://mlflow:5000
      DATA_DIR:           data/processed
      DEVICE:             cpu
    volumes:
      - ./data:/app/data
      - ./experiments:/app/experiments
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        REACT_APP_API_URL: ""
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  pgdata:
  mlflow_data:
